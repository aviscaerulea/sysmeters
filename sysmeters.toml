# vim: set ft=toml fenc=utf-8 ff=unix sw=4 ts=4 et :
##################################################
# sysmeters 設定ファイル
##################################################

# ウィンドウ設定
[window]
# ウィンドウ初期表示位置 X 座標（ピクセル）
# デフォルト: 20
x = 20

# ウィンドウ初期表示位置 Y 座標（ピクセル）
# デフォルト: 20
y = 20

# ウィンドウ幅（ピクセル）
# デフォルト: 460
width = 460

# 配色設定
[color]
# 背景色（RGB 16進数、例: 0x1A1A1A）
# デフォルト: 0x1A1A1A（濃いグレー）
background = 0x1A1A1A

# ボーダー・タイトルバー色
# デフォルト: 0x3C3C3C
border = 0x3C3C3C

# テキスト色
# デフォルト: 0xD4D4D4
text = 0xD4D4D4

# 面グラフ色（CPU 全体 / GPU / VRAM）
# デフォルト: 0xCC923E（アンバー）
graph_fill = 0xCC923E

# Disk Read グラフ色
# デフォルト: 0xDDA858（少し明るいアンバー）
disk_read = 0xDDA858

# Disk Write グラフ色
# デフォルト: 0x8C642A（暗めアンバー）
disk_write = 0x8C642A

# Network 受信グラフ色
# デフォルト: 0xDDA858（少し明るいアンバー）
net_recv = 0xDDA858

# Network 送信グラフ色
# デフォルト: 0x8C642A（暗めアンバー）
net_send = 0x8C642A

# Claude レートリミットバー色
# デフォルト: 0xCC923E（アンバー）
claude_bar = 0xCC923E

# CPU コア別縦バー色
# デフォルト: 0xCC923E（アンバー）
cpu_core = 0xCC923E

# ガードトーン設定
[guard]
# ガードトーン長（単位：ミリ秒）
# 警告音の再生前後に挿入する 19kHz 不可聴トーンの長さ。
# BLE ヘッドフォンの省電力移行で音声冒頭が途切れる問題を防ぐ。
# 冒頭・末尾の両方に共通で適用する。0 を指定すると挿入しない。
# デフォルト: 1500
tone_ms = 1500

# 警告色・警告音の閾値設定
[threshold]
# 警告音の有効/無効
# true の場合、以下の閾値を超えたときに alert.wav を再生する
# デフォルト: true
alert_sound = true

# CPU 使用率の警告閾値（単位：%）
# この値を超えると CPU 全体/コア別のテキストやバーが赤（0xEF5350）になる
# デフォルト: 95
cpu_pct = 95
# CPU 使用率の警告音リセット閾値（単位：%）
# この値を下回るまで警告音を再度鳴らさない
# デフォルト: 70
reset_cpu_pct = 70

# GPU 使用率の警告閾値（単位：%）
# この値を超えると GPU のテキストが赤（0xEF5350）になる
# デフォルト: 95
gpu_pct = 95
# GPU 使用率の警告音リセット閾値（単位：%）
# デフォルト: 70
reset_gpu_pct = 70

# メモリ使用率の警告閾値（単位：%）
# この値を超えると RAM/VRAM のテキストやバーが赤（0xEF5350）になる
# デフォルト: 90
mem_pct = 90
# メモリの警告音リセット閾値（単位：%）
# RAM/VRAM 共通
# デフォルト: 80
reset_mem_pct = 80

# Disk Space 使用率の警告閾値（単位：%）
# この値を超えると Disk Space のテキストやバーが赤（0xEF5350）になる
# デフォルト: 90
disk_space_pct = 90
# Disk Space の警告音リセット閾値（単位：%）
# デフォルト: 85
reset_disk_space_pct = 85

# Claude 5h レートリミットの警告閾値（単位：理想ペース超過%）
# 実使用率 - 理想ペース（緑線）がこの値以上でパーセンテージが太字赤（0xEF5350）になる
# 理想ペースを超えると黄色（0xd7b437）になる（変更不可）
# デフォルト: 20（= 5h ウィンドウの 1/5 = 1 時間分の超過）
claude_5h_pct = 20
# Claude 5h の警告音リセット閾値（単位：理想ペース超過%）
# デフォルト: 0（理想ペース以下に戻ったら即リセット）
reset_claude_5h_pct = 0

# Claude 7d レートリミットの警告閾値（単位：理想ペース超過%）
# 動作は claude_5h_pct と同様
# デフォルト: 7.14（= 7d ウィンドウの 1/14 = 12 時間分の超過）
claude_7d_pct = 7.14
# Claude 7d の警告音リセット閾値（単位：理想ペース超過%）
# デフォルト: 0（理想ペース以下に戻ったら即リセット）
reset_claude_7d_pct = 0

# Claude 超過料金の警告閾値（単位：ドル）
# extra_used_dollars がこの値を超えると "over $X.X" テキストが赤（0xEF5350）になる
# 警告音はこの値を「超えた」時点で 1 回鳴る（0.0 の場合、$0 を超えたとき＝超過発生時）
# デフォルト: 0.0（$0 超えで即赤表示・警告音）
claude_over = 0.0
# ※ 超過額は増加のみのためリセット閾値なし（1 回のみ警告音を鳴らす）

# Disk 書き込み量の警告閾値（単位：GB/h）
# 1 時間あたりの書き込み量がこの値を超えると GB/h テキストが赤（0xEF5350）になる
# デフォルト: 10.0
disk_gbh = 10.0
# Disk 書き込みの警告音リセット閾値（単位：GB/h）
# デフォルト: 5.0
reset_disk_gbh = 5.0

# 温度の注意閾値（単位：℃）
# CPU/GPU/NVMe 温度がこの値以上でオレンジ（0xFFA726）表示になる
# デフォルト: 70
temp_caution = 70
# 温度の危険閾値（単位：℃）
# CPU/GPU/NVMe 温度がこの値以上で赤（0xEF5350）表示になる
# デフォルト: 90
temp_critical = 90
# 温度の警告音リセット閾値（単位：℃）
# CPU/GPU/NVMe 共通。temp_critical を下回る値を設定する
# デフォルト: 85
reset_temp = 85

# OS アップタイムの警告閾値（単位：日）
# 稼働時間がこの日数を超えるとアップタイム表示が赤（0xEF5350）になる
# デフォルト: 7
uptime_days = 7
# ※ 再起動でリセットされるためリセット閾値なし（1 回のみ警告音を鳴らす）

# プロセス数の警告閾値
# この値を超えると Proc の数値が赤（0xEF5350）になる
# デフォルト: 1000
processes = 1000

# スレッド数の警告閾値
# この値を超えると Thread の数値が赤（0xEF5350）になる
# デフォルト: 10000
threads = 10000

# ハンドル数の警告閾値
# この値を超えると Handle の数値が赤（0xEF5350）になる
# デフォルト: 1000000
handles = 1000000

# プロセス優先度設定
[process]
# プロセス優先度の自動制御
# true の場合、ウィンドウが他ウィンドウに隠されている比率に応じて
# プロセス優先度を次の 3 段階で自動調整する：
#   隠蔽率 visible_range_pct 未満                    → ABOVE_NORMAL（NORMAL の 1 つ上）
#   上記以上 100 - hidden_range_pct 未満             → NORMAL
#   隠蔽率 100 - hidden_range_pct 以上               → BELOW_NORMAL（NORMAL の 1 つ下）
# 隠蔽率はウィンドウ矩形を 10x10 = 100 点でサンプリングして算出する。
# 最小化・非表示状態は完全隠蔽（100%）として扱う。
# デフォルト: false
priority_control = false

# ABOVE_NORMAL 判定範囲幅（単位：%、隠蔽率）
# 隠蔽率がこの値未満のとき、優先度を ABOVE_NORMAL（NORMAL の 1 つ上）に上げる。
# 0 以上 49 以下の値に自動クランプされる（上限 49 により両値の合計が最大 98 となり、NORMAL 範囲が消失しない）。
# デフォルト: 20
visible_range_pct = 20

# BELOW_NORMAL 判定範囲幅（単位：%、隠蔽率）
# 隠蔽率が 100 - この値 以上のとき、優先度を BELOW_NORMAL（NORMAL の 1 つ下）に下げる。
# 0 以上 49 以下の値に自動クランプされる。
# デフォルト: 20
hidden_range_pct = 20

# 隠蔽率チェック周期（単位：秒）
# priority_control = true のときのみ有効。
# 1 以上 300 以下の値に自動クランプされる。
# デフォルト: 5
check_interval_sec = 5

# ログ設定
[log]
# ログ出力先ディレクトリ
# 相対パスの場合は実行ファイルと同じディレクトリを基準に解決する
# デフォルト: "logs"
dir = "logs"

# ==================================================
# Claude Code 制限強化時間 Toast 通知
# ==================================================
[notify]
# 通知の有効/無効
# true の場合、ローカル平日 21:00 ちょうどに Toast 通知を発する。
# 起動時点でピーク期間内（21:00〜翌 03:00）であれば即時通知する。
# Anthropic の PT 平日 5:00-11:00 消費ピーク時間帯の開始予告。
# 通知時刻は固定（冬時間基準）。夏時間中は PT 5:00 より 1 時間早く通知される。
# 2026-05 に Anthropic がピーク時間帯レート制限を撤廃したためデフォルト OFF。
# デフォルト: false
peak_limit_enable = false

# 通知時に警告音（alert.wav）を鳴らすか
# デフォルト: false
peak_limit_sound = false

# Toast 通知のタイトル（最大 63 文字）
# デフォルト: "Claude Code 制限強化時間"
peak_limit_title = "Claude Code"

# Toast 通知の本文（最大 255 文字）
# デフォルト: "PT 平日 5:00-11:00 の消費ピーク時間帯が始まります"
peak_limit_body = "平日 21:00-03:00 ピーク制限時間です"

# ==================================================
# Claude Code 表示設定（メインアカウント）
# ==================================================
[claude]
# Usage API ポーリング間隔（秒）
# Anthropic Usage API の取得間隔。短くすると使用率の反映が速くなるが、
# 極端に短い値は API レート制限（HTTP 429）を招く可能性がある。
# [claude_sub] と共通の値が両アカウントに適用される。
# 有効範囲: 30〜3600、デフォルト: 120
# usage_interval_sec = 120

# 表示ラベル
# ウィンドウのメインアカウント側ヘッダに表示される名称。6 文字超は描画時に切り詰める。
# デフォルト: "Claude"
# name = "Claude"

# 5h リセット後の消費促進（nudge）
# 5h ウィンドウのリセット通過後にレートリミット消費が始まっていない間隙を検知したとき、
# 外部プロセスとして claude.exe を実行し次のウィンドウでの消費を開始させる。
# 起動直後でも間隙があれば実行される。同一ウィンドウにつき 1 回のみで繰り返されることはない。
# エラーはログに記録するのみ。デフォルト: false
# nudge_enable = false

# 更新促進用の claude.exe コマンドライン
# nudge_enable = true のとき実行されるコマンドライン。両アカウント共通の文字列を指定する。
# サブアカウントで実行される際は、CLAUDE_CONFIG_DIR 環境変数に claude_sub.config_dir が
# 一時設定された状態で起動される。Claude CLI に --config-dir コマンドオプションは存在せず、
# 設定ディレクトリの上書きは環境変数経由のみ。
# デフォルト: "claude.exe --safe-mode --model haiku --effort low -p \"say 'ok'\""
# nudge_cmd = "claude.exe --safe-mode --model haiku --effort low -p \"say 'ok'\""

# ピーク時間帯背景バー表示
# 5h バー上に PT 平日 5:00-10:59 の区間を暗赤色で重ねる表示。
# 2026-05 に Anthropic が当該レート制限を撤廃したためデフォルト OFF。
# 将来制限が再導入された場合は true に変更する。
# 両アカウント共通の設定。
# デフォルト: false
show_peak_bar = false

# 5h バー直近 N 分間の増加分濃色オーバーレイ
# 5h バー上に「直近 N 分間で増えた使用率」を濃い色（RAM の WSL オーバーレイと同色）で重ね塗りし、
# 消費ペースを視覚化する。緑の理想ペース線と組み合わせて、最近の傾きを一目で把握するための補助表示。
# メイン/サブの両アカウントに同一値が適用される。
# 0 を指定すると機能を無効化する。有効範囲: 0〜60、デフォルト: 5（分）
# delta_window_min = 5

# 使い切り不能検知（underuse 警告）の有効/無効
# 直近 underuse_pace_window_min 分間の観測傾き（端点差分）のペースで残り時間を消費し
# 続けても予測到達率が underuse_warn_pct に届かない＝挽回不能を検知し、
# 5h/7d バーの未使用部分の背景を暗紫色に変えて知らせる。
# 表示のみで警告音・Toast は発しない。メイン/サブの両アカウントに同一値が適用される。
# デフォルト: true
# underuse_enable = true

# 使い切り不能検知の目標到達率（%）
# 追い上げ外挿による予測到達率がこの値未満のとき警告表示する。
# 有効範囲: 0〜100、デフォルト: 98
# underuse_warn_pct = 98

# 使い切り不能検知のペース観測ウィンドウ幅（分）
# 直近この時間ぶんの Usage 観測サンプルの端点差分を消費ペースとして外挿に使う。
# 5h/7d バー共通。観測が 30 分に満たない間は判定しない。（起動直後・ウィンドウ切替直後）
# 有効範囲: 30〜1440、デフォルト: 150
# underuse_pace_window_min = 150

# 使い切り不能検知の判定開始猶予（分）
# ウィンドウ開始からこの時間が経過するまで判定しない。
# ウィンドウ序盤は調整しながらの使用が普通で、警告して使用を促すのは早計なため。
# 有効範囲: 5h は 0〜300、7d は 0〜10080。デフォルト: 120 / 2880（48 時間）
# underuse_grace_5h_min = 120
# underuse_grace_7d_min = 2880

# 使い切り不能検知の除外しきい値（分）
# 使用率が「この時間ぶんの均等消費」に相当する率以下の間は判定しない。
# （5h：60 分 = 20%、7d：1440 分 ≒ 14.3%）低使用時に常時警告となるのを防ぐ。
# 有効範囲: 5h は 0〜300、7d は 0〜10080。デフォルト: 60 / 1440
# underuse_ignore_5h_min = 60
# underuse_ignore_7d_min = 1440

# ==================================================
# Claude Code サブアカウント設定
# ==================================================
# サブアカウントは別の .claude/ 設定ディレクトリを使う Claude Code の追加プロファイル向け。
# 動作条件は次の 2 つ。enable = true、かつ config_dir が実在するディレクトリ。
# 警告音、Toast 通知はメインと独立に発火する。（閾値は [threshold] 内 claude_* の共通設定）
# セクションヘッダは常にアンコメント。中のキーを個別に設定する。
[claude_sub]
# サブ機能の有効/無効（必須）
# 既定 false。明示的に true にしない限りサブアカウントは動作しない。
# config_dir が空または不在パスの場合は自動で false に戻る。
# enable = false

# サブアカウントの .claude/ ディレクトリ絶対パス（enable=true 時に必須）
# Anthropic の OAuth 認証情報 .credentials.json を含むディレクトリを指定する。
# サブ用 claude.exe 起動時は CLAUDE_CONFIG_DIR 環境変数にこのパスが一時設定される。
# config_dir = "C:\\Users\\xxx\\.claude-sub"

# 表示ラベル
# ウィンドウのサブアカウント側ヘッダに表示される名称。6 文字超は描画時に切り詰める。
# デフォルト: "Claude"
# name = "Claude"

# サブ側の nudge 有効化
# 動作仕様はメインの nudge_enable と同じ。nudge_cmd は [claude] と共通。
# デフォルト: false
# nudge_enable = false

# ==================================================
# 更新チェック設定
# ==================================================
[update]
# GitHub リリースチェックの有効/無効
# 起動時に GitHub の最新リリースを確認し、新版があれば Toast 通知とトレイメニューで知らせる。
# ネットワーク通信を避けたい場合は false に設定する。デフォルト: true
# enabled = true
